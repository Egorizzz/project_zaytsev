global:
  scrape_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus_red66:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['172.18.0.1:9100']
  - job_name: 'app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['10.129.0.39:8066']
